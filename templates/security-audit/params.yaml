- name: repo_path
  label: Ruta del proyecto
  type: text
  required: false
  default: ~/.hermes/hermes-agent
  help: "Ruta al directorio del proyecto a auditar"
- name: language
  label: Idioma de salida
  type: select
  required: true
  options:
    - español
    - english
  default: español
  help: "Idioma en el que se genera el reporte"
